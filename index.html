<head>

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent: #E6BE8A;
            --ios-blur: blur(25px);
            --danger: #ff453a;
            --liquid-ease: cubic-bezier(0.23, 1, 0.32, 1);
            --pill-bg: rgba(255, 255, 255, 0.05);
            --pill-border: rgba(255, 255, 255, 0.15);
            --pill-shadow: rgba(0, 0, 0, 0.4);
            --icon-color: #fff;
        }

        [data-theme="light"] {
            --pill-bg: rgba(0, 0, 0, 0.05);
            --pill-border: rgba(0, 0, 0, 0.1);
            --pill-shadow: rgba(0, 0, 0, 0.1);
            --icon-color: #000;
            --glass: rgba(0, 0, 0, 0.05);
            --glass-border: rgba(0, 0, 0, 0.1);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body {
            margin: 0; padding: 0; background: #000;
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a, #000);
            color: #fff; font-family: 'Inter', 'Noto Sans Myanmar', sans-serif;
            overflow-x: hidden; line-height: 1.6;
        }
        
        body[data-theme="light"] {
            background: #f2f2f7;
            background-image: none;
            color: #000;
        }

        /* --- FLASH SALE UI --- */
        #flashSaleBanner {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%) translateY(-150%);
            width: 92%; max-width: 450px; z-index: 10002;
            background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: var(--ios-blur); -webkit-backdrop-filter: var(--ios-blur);
            border-radius: 30px; padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            transition: transform 0.8s var(--liquid-ease);
        }
        #flashSaleBanner.active { transform: translateX(-50%) translateY(0); }
        .promo-tag { background: var(--danger); color: #fff; padding: 3px 10px; border-radius: 50px; font-size: 10px; font-weight: 800; }
        .timer-val { color: var(--accent); font-weight: 700; font-family: 'Montserrat', sans-serif; font-size: 15px; }

        .price-row { display: flex; flex-direction: column; align-items: center; }
        .original-price { text-decoration: line-through; opacity: 0.4; font-size: 0.85rem; }
        .sale-price { color: var(--accent); font-weight: 600; font-size: 1.2rem; }
        .sale-price.active-sale { color: var(--danger); }

        /* --- HEADER & NOTI --- */
        .branding-header { text-align: center; padding: 110px 20px 30px; }
        .logo-main {
            font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 8vw, 3.5rem); letter-spacing: 8px; margin: 0;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.4) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 700;
        }
        [data-theme="light"] .logo-main { -webkit-text-fill-color: #000; }

        #liquidNoti {
            position: fixed; top: -150px; left: 50%; transform: translateX(-50%);
            z-index: 10001; padding: 14px 35px; border-radius: 50px;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: var(--ios-blur);
            border: 1px solid var(--glass-border); color: inherit;
            transition: all 0.7s var(--liquid-ease); pointer-events: none;
        }
        #liquidNoti.show { top: 90px; }

        /* --- LIQUID PILL BAR --- */
        .liquid-pill-bar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 40px; padding: 12px 35px;
            background: var(--pill-bg); border: 1px solid var(--pill-border);
            backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 50px; z-index: 5000; box-shadow: 0 15px 35px var(--pill-shadow);
            transition: all 0.5s var(--liquid-ease);
        }
        .pill-item { position: relative; cursor: pointer; font-size: 22px; display: flex; align-items: center; transition: transform 0.3s ease; }
        .pill-item:active { transform: scale(0.8); }
        .pill-badge { position: absolute; top: -8px; right: -12px; background: var(--danger); color: white; font-size: 10px; padding: 2px 7px; border-radius: 50px; display: none; }
        .icon { color: var(--icon-color); }

        /* --- SEARCH & GRID --- */
        .search-container { position: sticky; top: 20px; z-index: 1000; padding: 0 20px; margin-bottom: 40px; }
        #searchInput {
            width: 100%; max-width: 500px; display: block; margin: 0 auto;
            padding: 18px 30px; border-radius: 50px; background: var(--glass);
            border: 1px solid var(--glass-border); backdrop-filter: var(--ios-blur); color: inherit; 
            transition: 0.5s var(--liquid-ease); text-align: center;
        }

        .grid-container { display: grid; padding: 20px; gap: 25px; max-width: 1300px; margin: 0 auto 120px; grid-template-columns: repeat(2, 1fr); }
        @media (min-width: 1024px) { .grid-container { grid-template-columns: repeat(4, 1fr); } }

        .card {
            background: var(--glass); border: 1px solid var(--glass-border); border-radius: 35px;
            padding: 20px; text-align: center; backdrop-filter: var(--ios-blur);
            transition: 0.4s var(--liquid-ease); position: relative; overflow: hidden;
        }
        .card:hover { transform: translateY(-10px); background: rgba(255,255,255,0.06); }
        .card img { width: 100%; border-radius: 25px; margin-bottom: 15px; cursor: zoom-in; aspect-ratio: 1/1; object-fit: cover; }

.card img { 
    width: 100%; 
    border-radius: 25px; 
    margin-bottom: 15px; 
    cursor: zoom-in; 
    aspect-ratio: 1/1; 
    object-fit: cover; 
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.card:hover img {
    transform: scale(1.03);
}
        .card img { 
            width: 100%; 
            border-radius: 25px; 
            margin-bottom: 15px; 
            cursor: zoom-in; 
            aspect-ratio: 1/1; 
            object-fit: cover; 
            transition: transform 0.5s var(--liquid-ease);
        }

        .card:hover img {
            transform: scale(1.05);
        }
        .stock-label { font-size: 12px; margin: 10px 0; font-weight: 500; opacity: 0.7; }
        .blinking { color: var(--danger); animation: blink 1s infinite; font-weight: 600; }
        @keyframes blink { 50% { opacity: 0.2; } }

        .qty-box { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border-radius: 50px; padding: 5px; }
        .qty-btn { width: 32px; height: 32px; border-radius: 50%; border: none; background: #fff; cursor: pointer; font-weight: bold; color: #000; }
        .buy-btn { width: 100%; padding: 15px; border-radius: 20px; border: none; background: #fff; color: #000; font-weight: 600; cursor: pointer; }

        /* --- MODALS --- */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); z-index: 6000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: rgba(25, 25, 25, 0.85); border: 1px solid var(--glass-border); padding: 35px; border-radius: 40px; width: 100%; max-width: 420px; animation: modalIn 0.5s var(--liquid-ease); color: #fff; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.9) translateY(30px); } }
        input, textarea { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff; }

        /* Gallery */
        .gallery-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); backdrop-filter: blur(30px); z-index: 7000; flex-direction: column; justify-content: center; align-items: center; }
        .slider-wrap { width: 100%; height: 75vh; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .slide { min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; scroll-snap-align: center; }
        .slide img { max-width: 90%; max-height: 90%; border-radius: 30px; }
        .dots { display: flex; gap: 10px; margin-top: 30px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: 0.4s var(--liquid-ease); }
        .dot.active { width: 28px; border-radius: 10px; background: var(--accent); }

        /* Social Hub Menu (Bottom Left) */
        #hubMenu { display: none; position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--pill-bg); backdrop-filter: var(--ios-blur); border: 1px solid var(--glass-border); border-radius: 30px; padding: 15px; gap: 20px; z-index: 4999; animation: modalIn 0.4s var(--liquid-ease); }
        #hubMenu img { width: 50px; height: 50px; border-radius: 50%; }
      
#searchInput {
    width: 100%;
    padding: 18px 30px;
    border-radius: 50px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    color: #fff;
    text-align: center;
    outline: none;
    transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
}

#searchInput:focus {
    animation: relaxJelly 1.2s ease-in-out;
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(255, 255, 255, 0.25);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
}

@keyframes relaxJelly {
    0% { transform: scale(1, 1); }
    20% { transform: scale(1.05, 0.97); }
    45% { transform: scale(0.98, 1.02); }
    70% { transform: scale(1.01, 0.99); }
    100% { transform: scale(1, 1); }
}

    </style>
</head>

        <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCVRV8EGOdsjqAVHeSYO-Qesovdvg0LbbM",
            authDomain: "introvert-case-shop.firebaseapp.com",
            databaseURL: "https://introvert-case-shop-default-rtdb.firebaseio.com",
            projectId: "introvert-case-shop",
            storageBucket: "introvert-case-shop.firebasestorage.app",
            messagingSenderId: "531673000312",
            appId: "1:531673000312:web:2a8d5fa0674a5b43af008d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let cart = {}; 
        let allProducts = [], activeOrder = null, isFlashSale = false, discountPct = 0, saleTimer;
        
        function showNoti(msg) {
            const n = document.getElementById('liquidNoti');
            n.innerText = msg; n.classList.add('show');
            setTimeout(() => n.classList.remove('show'), 2000);
        }

        function toggleTheme() {
            const body = document.body;
            const themeBtn = document.querySelector('#themeBtn .icon');
            if (body.getAttribute('data-theme') === 'light') {
                body.removeAttribute('data-theme');
                themeBtn.innerText = '☀️';
            } else {
                body.setAttribute('data-theme', 'light');
                themeBtn.innerText = '🌙';
            }
        }

        db.ref('flashSaleSettings').on('value', (snap) => {
            const data = snap.val();
            const banner = document.getElementById('flashSaleBanner');
            if(data && data.isActive) {
                isFlashSale = true; discountPct = data.discountPercent || 0;
                banner.classList.add('active');
                document.getElementById('bannerText').innerText = data.promoText || "Flash Sale လျှော့ဈေး";
                startCountdown(data.endTime);
            } else {
                isFlashSale = false; banner.classList.remove('active');
                clearInterval(saleTimer);
            }
            render(allProducts);
        });
        db.ref('shopStatus').on('value', (snapshot) => {
    const data = snapshot.val();
    const overlay = document.getElementById('shopOverlay');
    if (data && data.isClosed) {
        overlay.style.display = 'flex';
        setTimeout(() => overlay.style.opacity = '1', 10);
        document.getElementById('reasonDisplay').innerText = data.reason || "ခေတ္တဆိုင်ပိတ်ထားပါသည်။";
    } else {
        overlay.style.opacity = '0';
        setTimeout(() => overlay.style.display = 'none', 500);
    }
});
        function startCountdown(endTime) {
            clearInterval(saleTimer);
            saleTimer = setInterval(() => {
                const now = new Date().getTime();
                const diff = new Date(endTime).getTime() - now;
                if (diff < 0) { clearInterval(saleTimer); isFlashSale = false; render(allProducts); return; }
                const h = Math.floor((diff % 86400000) / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('countdown').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }, 1000);
        }

        db.ref('inventory').on('value', (snap) => {
            const data = snap.val(); allProducts = [];
            for(let id in data) { allProducts.push({ id, ...data[id] }); }
            render(allProducts);
        });

        function render(data) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = data.map(p => {
                const stock = parseInt(p.stock) || 0;
                const basePrice = parseInt(p.price.toString().replace(/,/g, ''));
                             const currentQty = cart[p.id] ? cart[p.id].qty : 1; 

                let priceUI = `<div class="sale-price">${p.price} ကျပ်</div>`;
                if(isFlashSale && discountPct > 0) {
                    const finalPrice = Math.floor(basePrice * (1 - discountPct / 100));
                    priceUI = `<div class="price-row">
                        <span class="original-price">${p.price} ကျပ်</span>
                        <span class="sale-price active-sale">${finalPrice.toLocaleString()} ကျပ်</span>
                    </div>`;
                }

                return `
                <div class="card">
                    <img src="${p.images ? p.images[0] : ''}" onclick="openGallery('${p.id}')">
                    <div style="font-weight: 500;">${p.name}</div>
                    ${priceUI}
                    <div class="stock-label ${stock <= 3 && stock > 0 ? 'blinking' : ''}">
                        ${stock === 0 ? 'Sold Out' : 'လက်ကျန်: ' + stock + ' ခု'}
                    </div>
                    <div class="qty-box">
                        <button class="qty-btn" onclick="updateQty('${p.id}', -1)">-</button>
                        <span id="q-val-${p.id}" style="font-weight:600; width: 20px;">${currentQty}</span>
                        <button class="qty-btn" onclick="updateQty('${p.id}', 1)">+</button>
                    </div>
                    <button class="buy-btn" ${stock === 0 ? 'disabled' : ''} 
                        style="${cart[p.id] ? 'background:var(--accent); color:#000;' : ''}"
                        onclick="openOrder('${p.id}')">
                        ${stock === 0 ? 'ပစ္စည်းကုန်ပြီ' : (cart[p.id] ? '🛒ပါပြီနော်🎀' : 'ဝယ်မည်')}
                    </button>
                </div>`;
            }).join('');
            updateCartBadge();
        }

        function updateQty(id, change) {
            const p = allProducts.find(x => x.id === id);
            if(!p) return;
            const currentQtyInCart = cart[id] ? cart[id].qty : 1;
            let nextQty = currentQtyInCart + change;

            if (nextQty > p.stock) {
                showNoti(`လက်ကျန် ${p.stock} ခုသာ ရှိပါတော့တယ်`);
                return;
            }

            if (nextQty >= 1) {
                cart[id] = { name: p.name, qty: nextQty, price: p.price };
                if(change > 0) showNoti(`${p.name} ကို ခြင်းထဲထည့်လိုက်ပါပြီ`);
            } else {
                if (cart[id]) {
                    delete cart[id];
                    showNoti(`${p.name} ကို ခြင်းထဲမှ ဖယ်ထုတ်လိုက်ပါပြီ`);
                }
            }
            updateCartBadge();
            render(allProducts); 
        }

        function updateCartBadge() {
            const badge = document.getElementById('cartCountBadge');
            const totalItems = Object.keys(cart).length;
            if (totalItems > 0) {
                badge.innerText = totalItems;
                badge.style.display = 'block';
            } else {
                badge.style.display = 'none';
            }
        }

        function openGallery(id) {
            const p = allProducts.find(x => x.id === id);
            if(!p.images) return;
            const slider = document.getElementById('slider');
            const dotBox = document.getElementById('dotBox');
            slider.innerHTML = p.images.map(img => `<div class="slide"><img src="${img}"></div>`).join('');
            dotBox.innerHTML = p.images.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('');
            document.getElementById('galleryModal').style.display = 'flex';
            slider.onscroll = () => {
                const i = Math.round(slider.scrollLeft / slider.clientWidth);
                document.querySelectorAll('.dot').forEach((d, idx) => d.classList.toggle('active', idx === i));
            };
        }
        function closeGallery() { document.getElementById('galleryModal').style.display = 'none'; }

        function openOrder(id) {
            const p = allProducts.find(x => x.id === id);
            const qty = cart[id] ? cart[id].qty : 1;
            activeOrder = { ...p, selectedQty: parseInt(qty) };
            document.getElementById('orderQtyDisplay').innerText = `${p.name} - အရေအတွက် (${qty}) ခု`;
            document.getElementById('orderModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('orderModal').style.display = 'none'; }

        async function confirmOrder() {
            const n = document.getElementById('cName').value.trim();
            const p = document.getElementById('cPhone').value.trim();
            const a = document.getElementById('cAddr').value.trim();
            const nt = document.getElementById('cNote').value.trim();

            if (!n || !p || !a) { showNoti("အချက်အလက်များကို အပြည့်အစုံ ဖြည့်ပေးပါရှင်"); return; }

            const basePrice = parseInt(activeOrder.price.toString().replace(/,/g, ''));
            const finalPrice = isFlashSale ? Math.floor(basePrice * (1 - discountPct / 100)) : basePrice;

            try {
                await db.ref(`inventory/${activeOrder.id}/stock`).transaction(current => (current || 0) - activeOrder.selectedQty);
                const text = `🛒 **New Order**%0A👤 နာမည်: ${n}%0A📞 ဖုန်း: ${p}%0A🏠 လိပ်စာ: ${a}%0A📦 ပစ္စည်း: ${activeOrder.name}%0A🔢 အရေအတွက်: ${activeOrder.selectedQty}%0A💰 စုစုပေါင်း: ${(finalPrice * activeOrder.selectedQty).toLocaleString()} ကျပ်%0A📝 မှတ်ချက်: ${nt || '-'}`;
                window.open(`https://t.me/Samuelmmc?text=${text}`, '_blank');
                closeModal();
                showNoti("မှာယူမှု အောင်မြင်ပါသည်။ ကျေးဇူးတင်ပါတယ် ✨");
            } catch (e) { showNoti("Error: " + e.message); }
        }

        function smartSearch() {
            const v = document.getElementById('searchInput').value.toLowerCase();
            render(allProducts.filter(p => p.name.toLowerCase().includes(v)));
        }

        function toggleHub() {
            const m = document.getElementById('hubMenu');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }
                function openCart() {
            const ids = Object.keys(cart);
            if (ids.length === 0) { showNoti("ခြင်းထဲမှာ ပစ္စည်းမရှိသေးပါရှင်"); return; }
            
            const list = document.getElementById('liquidCartList');
            let total = 0;
            
            list.innerHTML = ids.map(id => {
                const item = cart[id];
                const p = allProducts.find(x => x.id === id);
                const basePrice = parseInt(item.price.toString().replace(/,/g, ''));
                const finalPrice = isFlashSale ? Math.floor(basePrice * (1 - discountPct / 100)) : basePrice;
                total += (finalPrice * item.qty);
                
                return `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.05);">
                    <div style="text-align:left;">
                        <div style="font-weight:500;">${item.name}</div>
                        <small style="opacity:0.6;">${finalPrice.toLocaleString()} x ${item.qty}</small>
                    </div>
                    <div style="color:var(--accent); font-weight:600;">${(finalPrice * item.qty).toLocaleString()} ကျပ်</div>
                </div>`;
            }).join('');
            
            document.getElementById('liquidTotal').innerText = total.toLocaleString() + " ကျပ်";
            document.getElementById('cartModal').style.display = 'flex';
        }

        function closeCart() { document.getElementById('cartModal').style.display = 'none'; }

        // direct ဝယ်တာရော cart ထဲကဝယ်တာရော နှစ်မျိုးလုံးအတွက် checkoutData ကို ပြောင်းလဲပေးတဲ့ function
        let checkoutData = []; 
        function showCustomerForm(type, id = null) {
            closeCart();
            if (type === 'direct') {
                const p = allProducts.find(x => x.id === id);
                const qty = cart[id] ? cart[id].qty : 1;
                checkoutData = [{ id: p.id, name: p.name, qty: qty, price: p.price }];
            } else {
                checkoutData = Object.keys(cart).map(id => ({ id: id, ...cart[id] }));
            }
            
            document.getElementById('orderQtyDisplay').innerText = "ရွေးချယ်ထားသော ပစ္စည်းများ မှာယူရန် အချက်အလက်ဖြည့်ပါ";
            document.getElementById('orderModal').style.display = 'flex';
        }

        // မူလ confirmOrder function ကို အကုန်လုံးဝယ်လို့ရအောင် ပြန်ပြင်ရေးခြင်း
        async function confirmOrder() {
            const n = document.getElementById('cName').value.trim();
            const p = document.getElementById('cPhone').value.trim();
            const a = document.getElementById('cAddr').value.trim();
            const nt = document.getElementById('cNote').value.trim();

            if (!n || !p || !a) { showNoti("အချက်အလက် ပြည့်စုံစွာ ဖြည့်ပါရှင်"); return; }

            let total = 0;
            let details = "";
            
            try {
                for (const item of checkoutData) {
                    const basePrice = parseInt(item.price.toString().replace(/,/g, ''));
                    const finalPrice = isFlashSale ? Math.floor(basePrice * (1 - discountPct / 100)) : basePrice;
                    total += (finalPrice * item.qty);
                    details += `• ${item.name} (${item.qty}ခု)%0A`;
                    
                    // Stock လျှော့ခြင်း
                    await db.ref(`inventory/${item.id}/stock`).transaction(c => (c || 0) - item.qty);
                }

                const text = `🛒 **New Order**%0A👤 နာမည်: ${n}%0A📞 ဖုန်း: ${p}%0A🏠 လိပ်စာ: ${a}%0A📦 ပစ္စည်းများ:%0A${details}💰 စုစုပေါင်း: ${total.toLocaleString()} ကျပ်%0A📝 မှတ်ချက်: ${nt || '-'}`;
                window.open(`https://t.me/Samuelmmc?text=${text}`, '_blank');
                
                cart = {}; // Cart ရှင်းမယ်
                updateCartBadge();
                closeModal();
                showNoti("မှာယူမှု အောင်မြင်ပါသည်။ ကျေးဇူးတင်ပါတယ် ✨");
                render(allProducts);
            } catch (e) { showNoti("Error: " + e.message); }
        }
    </script>
</body>
