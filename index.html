    /* Base Body (အခြေခံ) */    
    body {
    margin: 0;
    padding: 0;
    width: 100%;
    overflow-x: hidden !important;
    background-color: #000;
    color: #fff;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    transition: background-color var(--transition-speed) ease, color var(--transition-speed) ease;
}

/* ၃။ Light Mode Theme */
body[data-theme="light"] {
    background-color: #f2f2f7;
    color: #000;
}

/* ၄။ Spotlight/Theme Effect (တစ်နေရာတည်းမှာ စုရေးပါ) */
/* Light Mode မှာ အလင်းတန်း ပျောက်စေရန် */
body[data-theme="light"] .spotlight::after,
body.light-mode .spotlight::after {
    opacity: 0 !important;
}

/* Dark Mode မှာ အလင်းတန်း ပေါ်စေရန် */
body[data-theme="dark"] .spotlight::after {
    opacity: 1 !important;
}

    
/* Card များအတွက် အသွင်ကူးပြောင်းမှု သတ်မှတ်ခြင်း */
.card {
    transition: background-color 2s ease, border-color 2s ease, box-shadow 2s ease;
}

        -webkit-tap-highlight-color: transparent;

/* Modal အရွယ်အစားထိန်းချုပ်ရန် */
.modal-content {
    max-height: 85vh; 
    overflow-y: auto;
    scrollbar-width: thin; 
}    
     
.announcement-bar {
    width: 90%;
    max-width: 500px;
    margin: 0 auto 20px auto;
    padding: 12px 0;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-radius: 50px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    overflow: hidden;
    white-space: nowrap;
    position: relative;
    display: none;
    animation: fadeIn 0.5s ease-out;
}

[data-theme="light"] .announcement-bar {
    background: rgba(255, 69, 58, 0.05);
    border: 1px solid rgba(255, 69, 58, 0.2);
}

.announcement-text {
    display: inline-block;
    padding-left: 100%;
    animation: marquee 15s linear infinite;
    color: #ff6e66;
    font-size: 0.95rem;
    font-weight: 500;
}

@keyframes marquee {
    0% { transform: translate(0, 0); }
    100% { transform: translate(-100%, 0); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}


[data-theme="light"] .announcement-bar {
    background: rgba(255, 69, 58, 0.05);
    border: 1px solid rgba(255, 69, 58, 0.2);
}

.warning-icon {
    font-size: 1.2rem;
    animation: shake 0.5s infinite;
}

@keyframes shake {
    0% { transform: rotate(0deg); }
    25% { transform: rotate(10deg); }
    50% { transform: rotate(0deg); }
    75% { transform: rotate(-10deg); }
    100% { transform: rotate(0deg); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}

        /* --- LIQUID PILL BAR --- */
        .liquid-pill-bar {
    position: fixed;
    bottom: 30px;
    /* အလယ်တည့်တည့်ကျစေဖို့ နည်းလမ်းသစ် */

    display: flex;

    padding: 12px 25px;
    
    width: fit-content;
    max-width: 90%;
    
    background: var(--pill-bg);
    border: 1px solid var(--pill-border);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-radius: 50px;
    z-index: 5000;
    box-shadow: 0 15px 35px var(--pill-shadow);
    transition: all 0.5s var(--liquid-ease);
}

        .pill-item { position: relative; cursor: pointer; font-size: 22px; display: flex; align-items: center; transition: transform 0.3s ease; }

    filter: brightness(1.8) contrast(1.2);

/* Hyper-realistic Lens Flare Positioning */
.hyper-flare {
    position: absolute; 
    top:-9px; /* I ရဲ့ ဘယ်ဘက်အပေါ်ထောင့် */
    left: -22px;
    z-index: 10;    
    width: 50px; height: 50px;
    pointer-events: none;
    /* တောက်/မှိန်ဖြစ်နေမည့် Pulse Animation */
    animation: breathing-flare 2s infinite ease-in-out;
}

.core {
    position: absolute; width: 100%; height: 100%;
    background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,255,255,0.2) 40%, transparent 70%);
}

.streak {
    position: absolute; top: 50%; left: 50%;
    width: 140%; height: 1.5px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
    transform: translate(-50%, -50%) rotate(45deg);
}
@keyframes light-blur {
    0%, 100% { 
        filter: blur(0px) brightness(1); 
    }
    50% { 
        /* အလင်းတန်းအလယ်ရောက်ချိန်မှာ ဝါးပြီး လင်းသွားစေရန် */
        filter: blur(1.5px) brightness(1.8);
        text-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
    }
}

@keyframes shine-sweep {
    0% { background-position: -100% 0; }
    100% { background-position: 100% 0; }
}
@keyframes shine-sweep {
    0% { background-position: -100% 0; }
    100% { background-position: 100% 0; }
}

/* တောက်လိုက်မှိန်လိုက် ဖြစ်စေမည့် Animation */
@keyframes breathing-flare {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.1); }
}

    function render(data) {
    const grid = document.getElementById('productGrid');
    if (!grid) return;

    // data မရှိရင် (သို့) empty ဖြစ်နေရင် error မတက်အောင် ကာကွယ်ခြင်း

        return;
    }

    if (typeof cart === 'undefined') window.cart = {};

    grid.innerHTML = data.map(p => {
        const priceStr = p.price ? p.price.toString() : "0";
        const basePrice = parseInt(priceStr.replace(/,/g, '')) || 0;
        const stock = parseInt(p.stock) || 0;
        const isInCart = cart && cart[p.id];

        let displayImg = (p.images && p.images[0]) ? p.images[0] : (p.img ? p.img : 'https://via.placeholder.com/150');

        // Flash Sale Logic
        let priceUI = `<div style="color:var(--accent); font-weight: 700; margin: 5px 0;">${p.price} ကျပ်</div>`;

        }

        return `
        <div class="card ${stock === 0 ? 'out-of-stock' : ''}">
            <div style="position:relative;">
                <img src="${displayImg}" onclick="openGallery('${p.id}')" onerror="this.src='https://via.placeholder.com/150'">

function smartSearch() {
    const v = document.getElementById('searchInput').value.toLowerCase();
    // နာမည်ထဲမှာ ပါတာကို ရှာတယ်
    const filtered = allProducts.filter(p => p.name.toLowerCase().includes(v));
    
    // ဒီနေရာမှာ render ကို ရှာတွေ့တဲ့ data (filtered) ပေးလိုက်တာပါ
    render(filtered);
}


 function applyScrollEffect() {
    const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry, index) => {
            if (entry.isIntersecting) {
                // တစ်ခုချင်းစီ ၀.၁ စက္ကန့်စီ ခြားပြီး ပေါ်လာအောင် လုပ်တာပါ
                setTimeout(() => {
                    entry.target.classList.add('appear');
                }, index * 100); 
                observer.unobserve(entry.target); // တစ်ခါပေါ်ပြီးရင် ထပ်မလုပ်ခိုင်းတော့ဘူး (Performance ကောင်းအောင်)
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.card').forEach(card => {
        observer.observe(card);
    });
}

// ၁။ Login ခလုတ်အတွက် Function (ပိုမိုသန့်ရှင်းအောင်)
function loginWithGoogle() {
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });

    firebase.auth().signInWithPopup(provider)
    .then((result) => {
        const user = result.user;
        
        // Database ထဲသို့ User Data ထည့်ခြင်း
        db.ref('users/' + user.uid).update({
            name: user.displayName,
            email: user.email,
            photo: user.photoURL,
            lastLogin: firebase.database.ServerValue.TIMESTAMP
        });

        // အောင်မြင်တဲ့အခါ ပေါ်လာမည့် Noti
        showNoti("အောင်မြင်စွာ Login ဝင်ပြီးပါပြီ! ✨");
        
        // Modal ပိတ်ခြင်း
        document.getElementById('authModal').style.display = 'none';
        document.body.style.overflow = "auto";
    })
    .catch((error) => {
        // Error ဖြစ်တဲ့အခါ ပေါ်လာမည့် Noti
        showNoti("Login မအောင်မြင်ပါ: " + error.message);
        console.error("Login Error:", error.message);
    });
}

//Product Actions
function updateQty(id, change) {
    if (!allProducts || allProducts.length === 0) return; 
    const p = allProducts.find(x => x.id === id);
    if (!p) return;

    if (typeof cart === 'undefined') window.cart = {};

    const currentQtyInCart = cart[id] ? cart[id].qty : 0;
    let nextQty = currentQtyInCart + change;
    if (nextQty < 0) return; 
    // Stock စစ်ဆေးခြင်း
    if (nextQty > p.stock) {
        showNoti(`လက်ကျန် ${p.stock} ခုသာ ရှိပါတော့တယ်`);
        return;
    }

if (nextQty >= 1) {
    cart[id] = { name: p.name, qty: nextQty, price: p.price };
    // + ခလုတ်နှိပ်တိုင်း ပေါ်အောင် ဒီနေရာမှာ သေချာခေါ်ပါ
    showNoti(`${p.name} (${nextQty} ခု) ခြင်းထဲထည့်လိုက်ပါပြီ ✨`);
} else {
    if (cart[id]) {
        delete cart[id];
        showNoti(`${p.name} ကို ခြင်းထဲမှ ဖယ်ထုတ်လိုက်ပါပြီ 🗑️`);
    }
}

    // --- DOM ကို တိုက်ရိုက်ပြင်ခြင်း (အရေးကြီး) ---
    
    // ၁။ အရေအတွက်ပြတဲ့ span ကို တိုက်ရိုက်ပြင်ပါ
    const qtySpan = document.getElementById(`q-val-${id}`);
    if (qtySpan) qtySpan.innerText = nextQty;

    // ၂။ ခလုတ် (Button) ပုံစံကို တိုက်ရိုက်ပြင်ပါ
    // သင့် Original Code ထဲက ခလုတ်သည် onclick="openOrder('${p.id}')" ဟု ရေးထားသည်
    const btn = document.querySelector(`button[onclick="openOrder('${id}')"]`);
    if (btn) {
        const isInCart = nextQty > 0;
        btn.innerText = isInCart ? '🛒 🔥' : 'ဝယ်မည်';
        btn.style.background = isInCart ? 'var(--accent)' : '';
        btn.style.color = isInCart ? '#000' : '';
    }

    // ၃။ Cart Badge ကို update လုပ်ပါ
    if (typeof updateCartBadge === 'function') updateCartBadge();
}

// Customer ရွေးချယ်လိုက်တဲ့ Platform အလိုက် link ခေါ်ပေးမယ့် function
async function sendOrder(platform) {
    // Original ID များ (cName, cPhone, cAddr, cNote) ကို ပြန်သုံးထားပါသည်
    const n = document.getElementById('cName').value.trim();
    const p = document.getElementById('cPhone').value.trim();
    const a = document.getElementById('cAddr').value.trim();
    const noteEl = document.getElementById('cNote');
    const nt = noteEl ? noteEl.value.trim() : "";

    if (!n || !p || !a) { 
        showNoti("အချက်အလက် ပြည့်စုံစွာ ဖြည့်ပါရှင်"); 
        return; 
    }

    let total = 0;
    let details = "";
    let firebaseItems = [];
    
    // Flash Sale Check (isFlashActive နှင့် discountPct ကို global scope မှ ယူပါသည်)
    const isFlashActiveCheck = typeof isFlashActive !== 'undefined' ? isFlashActive : false;
    const discountPctCheck = typeof discountPct !== 'undefined' ? discountPct : 0;

    try {
        // Cart ထဲရှိ ပစ္စည်းများကို Loop ပတ်ခြင်း
        for (const id in cart) {
            const item = cart[id];
            // ဈေးနှုန်းမှ ကော်မာများဖြုတ်၍ နံပါတ်ပြောင်းခြင်း
            const basePrice = parseInt(item.price.toString().replace(/,/g, ''));
            const isFlashItem = isFlashActiveCheck && item.flashSale;
            const finalPrice = isFlashItem ? Math.floor(basePrice * (1 - discountPctCheck / 100)) : basePrice;
            
            total += (finalPrice * item.qty);
            details += `• ${item.name} (${item.qty}ခု)%0A`;
            
            // Firebase အတွက် ID ပါဝင်သော Item List ပြင်ဆင်ခြင်း
            firebaseItems.push({
                id: id, 
                name: item.name,
                qty: item.qty,
                price: finalPrice
            });
        }

        if (firebaseItems.length === 0) {
            showNoti("Cart ထဲတွင် ပစ္စည်းမရှိပါ");
            return;
        }

        // ၁။ Firebase Order ထဲသို့ Data ပို့ခြင်း (Stock လျှော့သည့် logic မပါဝင်တော့ပါ)
        await db.ref('orders').push({
            name: n,
            phone: p,
            address: a,
            note: nt || '-',
            items: firebaseItems,
            total: total,
            status: 'pending',
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });

        // ၂။ Telegram/Viber သို့ ပို့မည့် စာသားပြင်ဆင်ခြင်း
        const text = `🛒 *New Order*%0A👤 နာမည်: ${n}%0A📞 ဖုန်း: ${p}%0A🏠 လိပ်စာ: ${a}%0A📦 ပစ္စည်းများ:%0A${details}💰 စုစုပေါင်း: ${total.toLocaleString()} ကျပ်%0A📝 မှတ်ချက်: ${nt || '-'}`;
        
        const url = platform === 'telegram' 
            ? `https://t.me/Samuelmmc?text=${text}` 
            : `viber://forward?text=${text}`;
            
        window.open(url, '_blank');
        
        // ၃။ အောင်မြင်ပါက Cart ရှင်းလင်းခြင်းနှင့် UI Update လုပ်ခြင်း
        cart = {}; 
        if (typeof updateCartBadge === 'function') updateCartBadge(); 
        if (typeof closeModal === 'function') closeModal();
        
        showNoti("မှာယူမှု အောင်မြင်ပါသည်။ ✨");

    } catch (e) { 
        console.error("Order Error:", e);
        showNoti("Error: " + e.message); 
    }
}

}

// Flash Sale Listener
        db.ref('flashSaleSettings').on('value', (snap) => {
            const data = snap.val();
            const banner = document.getElementById('flashSaleBanner');
            if(data && data.isActive) {
                isFlashSale = true; discountPct = data.discountPercent || 0;
                banner.classList.add('active');
                document.getElementById('bannerText').innerText = data.promoText || "Flash Sale လျှော့ဈေး";
                startCountdown(data.endTime);
            } else {
                isFlashSale = false; banner.classList.remove('active');
                clearInterval(saleTimer);
            }
            render(allProducts);
        });
        
        function startCountdown(endTime) {
            clearInterval(saleTimer);
            saleTimer = setInterval(() => {
                const now = new Date().getTime();
                const diff = new Date(endTime).getTime() - now;
                if (diff < 0) { clearInterval(saleTimer); isFlashSale = false; render(allProducts); return; }
                const h = Math.floor((diff % 86400000) / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('countdown').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }, 1000);
        }
